<!DOCTYPE html>
<html lang="en">
	<head id="head">
		<meta charset="utf-8">
		<meta name="viewport" content="initial-scale=1">
		<title :text="$site.title"></title>
		<meta name="theme-color" id="theme-color-meta" content="#24273a">
		<script>
			(function () {
				var THEME_COLORS = { light: "#eff1f5", dark: "#24273a" };
				try {
					var saved = localStorage.getItem("theme");
					if (saved === "light" || saved === "dark") {
						document.documentElement.setAttribute("data-theme", saved);
					}
				} catch (e) {}
				var theme = document.documentElement.getAttribute("data-theme");
				if (!theme) {
					theme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
						? "light" : "dark";
				}
				var meta = document.getElementById("theme-color-meta");
				if (meta) meta.setAttribute("content", THEME_COLORS[theme]);
			})();
		</script>
		<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%80%3C/text%3E%3C/svg%3E">
		<link type="text/css" rel="stylesheet" href="$site.asset('style.css').link()">
		<link type="text/css" rel="stylesheet" href="$site.asset('highlight.css').link()">
		<!-- mathtex -->
		<link type="text/css" rel="stylesheet" href="$site.asset('Temml-Local.css').link()">
		<script defer src="$site.asset('temml.min.js').link()"></script>
		<script defer src="$site.asset('render-mathtex.js').link()"></script>
		<!-- /mathtex -->
		<super>
	</head>
	<body id="body">
		<div class="progress-bar" id="progress-bar"></div>
		<header>
			<p class="site-title">
				<a href="$site.page('').link()" :text="$site.title"></a><span class="cursor">_</span>
			</p>
			<p class="site-tagline">Cache-friendly reads, user-hostile writes.</p>
			<nav>
				<a href="$site.page('').link()">home</a>
				<a href="$site.page('blog').link()">blog</a>
				<a href="$site.page('about').link()">about</a>
				<button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme">&#127769;</button>
			</nav>
		</header>
		<super>
		<footer>
			<div class="footer-row">
				<span :text="$site.title"></span>
				<a href="/blog/index.xml">RSS</a>
			</div>
			<div class="footer-row">
				<span class="build-flags" id="quip"></span>
				<span class="cycle-counter" aria-hidden="true" title="not a real metric — just a little odometer that ticks up while this tab is open. click for a boost.">
					<span class="led"></span>cycles burned: <span id="cycle-count">0</span>
				</span>
			</div>
		</footer>
		<script>
			(function () {
				var THEME_COLORS = { light: "#eff1f5", dark: "#24273a" };
				var reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

				var quips = [
					"-O3 -march=native",
					"AVX-512 heated my room today",
					"this text is guaranteed to be thread-safe",
					"it's not a memory leak, it's a long-lived cache",
					"premature optimization is the root of all fun",
					"perf stat says it's fine",
					"01101000 01101001",
					"measured twice, optimized once",
					"this footer was branch-predicted correctly",
					"compiling... compiling... compiling...",
					"please don't profile the footer",
					"this comment is O(1)",
					"warning: footer may contain undefined behavior",
					"thanks for scrolling all the way down here",
					"now with 30% fewer cache misses",
					"hand-tuned, mostly by accident",
					"running on vibes and L1 cache"
				];
				var el = document.getElementById("quip");
				if (el) el.textContent = quips[Math.floor(Math.random() * quips.length)];

				// Copy button for code blocks.
				document.querySelectorAll("pre > code").forEach(function (codeEl) {
					var pre = codeEl.parentElement;
					var btn = document.createElement("button");
					btn.type = "button";
					btn.className = "copy-btn";
					btn.textContent = "copy";
					btn.setAttribute("aria-label", "Copy code to clipboard");
					btn.addEventListener("click", function () {
						var text = codeEl.textContent;
						var done = function () {
							btn.textContent = "copied!";
							btn.classList.add("copied");
							clearTimeout(btn._resetTimer);
							btn._resetTimer = setTimeout(function () {
								btn.textContent = "copy";
								btn.classList.remove("copied");
							}, 1600);
						};
						if (navigator.clipboard && navigator.clipboard.writeText) {
							navigator.clipboard.writeText(text).then(done, done);
						} else {
							var ta = document.createElement("textarea");
							ta.value = text;
							ta.style.position = "fixed";
							ta.style.opacity = "0";
							document.body.appendChild(ta);
							ta.select();
							try { document.execCommand("copy"); } catch (err) {}
							document.body.removeChild(ta);
							done();
						}
					});
					pre.appendChild(btn);
				});

				// Light/dark theme toggle, persisted to localStorage.
				var toggle = document.getElementById("theme-toggle");
				function currentTheme() {
					var attr = document.documentElement.getAttribute("data-theme");
					if (attr) return attr;
					return (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
						? "light" : "dark";
				}
				function updateToggleIcon() {
					if (!toggle) return;
					// Icon shows the theme you'd switch *to*.
					toggle.innerHTML = currentTheme() === "light" ? "&#127769;" : "&#9728;&#65039;";
				}
				updateToggleIcon();
				if (toggle) {
					toggle.addEventListener("click", function () {
						var next = currentTheme() === "light" ? "dark" : "light";
						document.documentElement.setAttribute("data-theme", next);
						try { localStorage.setItem("theme", next); } catch (e) {}
						updateToggleIcon();
						var meta = document.getElementById("theme-color-meta");
						if (meta) meta.setAttribute("content", THEME_COLORS[next]);
					});
				}

				// Pick a random accent for the post drop cap each load.
				var dropcapColors = [
					"--ctp-red", "--ctp-peach", "--ctp-yellow", "--ctp-green",
					"--ctp-teal", "--ctp-blue", "--ctp-mauve", "--ctp-pink"
				];
				var pick = dropcapColors[Math.floor(Math.random() * dropcapColors.length)];
				document.documentElement.style.setProperty("--dropcap-color", "var(" + pick + ")");

				// Scroll progress bar.
				var progressBar = document.getElementById("progress-bar");
				function updateProgress() {
					if (!progressBar) return;
					var scrollTop = window.scrollY || document.documentElement.scrollTop;
					var max = document.documentElement.scrollHeight - window.innerHeight;
					var pct = max > 0 ? (scrollTop / max) * 100 : 0;
					progressBar.style.width = Math.min(100, Math.max(0, pct)) + "%";
				}
				document.addEventListener("scroll", updateProgress, { passive: true });
				window.addEventListener("resize", updateProgress);
				updateProgress();

				// "Cycles burned" odometer. Pauses when the tab isn't visible.
				var cycleEl = document.getElementById("cycle-count");
				var cycleCounter = document.querySelector(".cycle-counter");
				if (cycleEl) {
					var targetCount = Math.floor(1e9 + Math.random() * 8e9);
					var count = 0;
					var timer = null;
					var boost = 1;
					var tick = function () {
						count += Math.floor((2200000 + Math.random() * 900000) * boost);
						cycleEl.textContent = count.toLocaleString("en-US");
					};
					var start = function () {
						if (!timer) {
							tick();
							timer = setInterval(tick, 80);
						}
					};
					var stop = function () {
						if (timer) {
							clearInterval(timer);
							timer = null;
						}
					};
					document.addEventListener("visibilitychange", function () {
						if (document.hidden) stop(); else start();
					});

					// On load: rev up from 0 to the starting value, then idle
					// normally. One-shot — doesn't repeat while reading.
					if (!reducedMotion) {
						if (cycleCounter) cycleCounter.classList.add("overclock");
						var step = Math.ceil(targetCount / 24);
						var bootTimer = setInterval(function () {
							count += step;
							if (count >= targetCount) {
								count = targetCount;
								clearInterval(bootTimer);
								if (cycleCounter) cycleCounter.classList.remove("overclock");
								if (!document.hidden) start();
							}
							cycleEl.textContent = count.toLocaleString("en-US");
						}, 35);
					} else {
						count = targetCount;
						cycleEl.textContent = count.toLocaleString("en-US");
						if (!document.hidden) start();
					}

					// Click the counter for a brief, purely cosmetic overclock.
					if (cycleCounter) {
						var overclockTimer = null;
						cycleCounter.addEventListener("click", function () {
							boost = 16;
							cycleCounter.classList.add("overclock");
							clearTimeout(overclockTimer);
							overclockTimer = setTimeout(function () {
								boost = 1;
								cycleCounter.classList.remove("overclock");
							}, 2200);
						});
					}
				}

				// Click sparks + "type perf" easter egg. Sparks are skipped if the
				// user prefers reduced motion; the achievement toast still shows.
				var sparkColors = [
					"--ctp-red", "--ctp-peach", "--ctp-yellow", "--ctp-green",
					"--ctp-teal", "--ctp-blue", "--ctp-mauve", "--ctp-pink", "--ctp-sapphire"
				];
				function spawnSparks(x, y, count) {
					if (reducedMotion) return;
					for (var i = 0; i < count; i++) {
						var s = document.createElement("span");
						s.className = "spark";
						var color = sparkColors[Math.floor(Math.random() * sparkColors.length)];
						s.style.background = "var(" + color + ")";
						s.style.left = x + "px";
						s.style.top = y + "px";
						var angle = Math.random() * Math.PI * 2;
						var dist = 24 + Math.random() * 50;
						s.style.setProperty("--dx", Math.cos(angle) * dist + "px");
						s.style.setProperty("--dy", Math.sin(angle) * dist + "px");
						s.style.setProperty("--spin", Math.floor(Math.random() * 360) + "deg");
						document.body.appendChild(s);
						s.addEventListener("animationend", function () {
							this.remove();
						});
					}
				}

				document.addEventListener("click", function (e) {
					spawnSparks(e.clientX, e.clientY, 6 + Math.floor(Math.random() * 4));
				});

				// Hovering over interactive bits gets a tiny (quieter) spark too,
				// so feedback isn't limited to clicks.
				document.addEventListener("pointerover", function (e) {
					var t = e.target.closest && e.target.closest(
						"nav a, .theme-toggle, .post-entry .title, footer a, " +
						"[class^='tag-'], .cycle-counter"
					);
					if (!t || (e.relatedTarget && t.contains(e.relatedTarget))) return;
					var rect = t.getBoundingClientRect();
					spawnSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 2);
				});

				// ---- Page-open intro. Runs once, settles within ~1s, then
				// the page goes quiet — no ongoing ambient effects while
				// someone is actually reading.
				if (!reducedMotion) {
					// Progress bar does a quick full sweep, then settles back
					// to wherever the actual scroll position is.
					if (progressBar) {
						progressBar.classList.add("boot");
						progressBar.addEventListener("animationend", function handler() {
							progressBar.classList.remove("boot");
							progressBar.style.opacity = "";
							updateProgress();
							progressBar.removeEventListener("animationend", handler);
						});
					}

					// Title "decrypts" from glitch characters into its real text.
					var titleLink = document.querySelector(".site-title a");
					if (titleLink) {
						var finalTitle = titleLink.textContent;
						var glitchChars = "01<>{}#/_!@$%&*^~".split("");
						var frame = 0;
						var totalFrames = 14;
						var decryptTimer = setInterval(function () {
							frame++;
							var revealed = Math.floor((frame / totalFrames) * finalTitle.length);
							var out = "";
							for (var i = 0; i < finalTitle.length; i++) {
								if (i < revealed || finalTitle[i] === " ") {
									out += finalTitle[i];
								} else {
									out += glitchChars[Math.floor(Math.random() * glitchChars.length)];
								}
							}
							titleLink.textContent = out;
							if (frame >= totalFrames) {
								clearInterval(decryptTimer);
								titleLink.textContent = finalTitle;
							}
						}, 40);
					}
				}

			})();
		</script>
	</body>
</html>
